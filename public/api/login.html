<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
    </head>
    <body>
        <form>
            <input type="email" name="email" /><br />
            <div id="emailMsg" style="color: red; height: 1em;"></div>
            <input type="password" name="password" />
            <div id="pswdMsg" style="color: red; height: 1em;"></div>
        </form>
        <button onclick="login()">
            Log In
        </button>
        <script>
            const login = async () => {
                // const host = 'http://127.0.0.1:5500/site.zone/www/public/api/'
                const host = 'http://localhost/api/'
    
                const lang = document.querySelector('html').getAttribute('lang')
    
                const form = document.querySelector('form');
                const userData = new FormData(form);
    
                const response = await fetch('http://localhost/api/test/login', {
                    method: 'POST',
                    headers: {'Accept-Language': lang},
                    body: userData
                });
    
                const json = await response.json({});
    
                if (json.status == 'success') {
                    sessionStorage.setItem('Bearer', json.bearer)
                    sessionStorage.setItem('Refresh', json.refresh)
                    sessionStorage.setItem('user', JSON.stringify(json.user))
    
                    document.location.href = host + 'welcome.html'
                } else {
                    const emailMsg = document.getElementById('emailMsg')
                    const pswdMsg = document.getElementById('pswdMsg')
                    emailMsg.innerText = json.email.msg
                    pswdMsg.innerText = json.password.msg
                }
            }
        </script>
    </body>
</html>
